{% extends "base.html" %}
{% block content %}
<div style="max-width:560px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem">
        <a href="{{ url_for('notes') }}" style="color:var(--text-muted);text-decoration:none;font-size:0.875rem">Notes</a>
        <span style="color:var(--text-muted)">/</span>
        <span style="font-size:0.875rem;color:var(--text-main)">{{ note.title }}</span>
    </div>

    <form method="POST" style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-input" value="{{ note.title }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Subject / folder</label>
            <select name="subject" class="form-select">
                <option value="">No folder</option>
                {% for subj in user_subjects %}
                <option value="{{ subj.name }}" {% if note.subject == subj.name %}selected{% endif %}>{{ subj.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Content</label>
            <textarea name="content" class="form-textarea" rows="6">{{ note.content or '' }}</textarea>
        </div>
        <div>
            <label class="form-label" style="margin-bottom:0.5rem">Links</label>
            <div id="links-container" style="display:flex;flex-direction:column;gap:0.5rem">
                {% for link in note.links %}
                <div class="link-row" style="display:grid;grid-template-columns:1fr 2fr auto;gap:0.5rem;align-items:center">
                    <input type="text" name="link_label[]" class="form-input" placeholder="Label" value="{{ link.label or '' }}" style="font-size:0.8rem;padding:0.4rem 0.625rem">
                    <input type="url" name="link_url[]" class="form-input" placeholder="https://..." value="{{ link.url }}" style="font-size:0.8rem;padding:0.4rem 0.625rem">
                    <button type="button" onclick="this.closest('.link-row').remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0.25rem">✕</button>
                </div>
                {% endfor %}
            </div>
            <button type="button" onclick="addLinkRow()" style="margin-top:0.5rem;font-size:0.75rem;color:#C9A84C;background:none;border:none;cursor:pointer;padding:0">+ Add link</button>
        </div>
        <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
            <button type="submit" class="btn-primary">Save changes</button>
            <a href="{{ url_for('notes') }}" class="btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
function addLinkRow() {
    const container = document.getElementById('links-container');
    const row = document.createElement('div');
    row.className = 'link-row';
    row.style.cssText = 'display:grid;grid-template-columns:1fr 2fr auto;gap:0.5rem;align-items:center';
    row.innerHTML = `
        <input type="text" name="link_label[]" class="form-input" placeholder="Label" style="font-size:0.8rem;padding:0.4rem 0.625rem">
        <input type="url" name="link_url[]" class="form-input" placeholder="https://..." style="font-size:0.8rem;padding:0.4rem 0.625rem">
        <button type="button" onclick="this.closest('.link-row').remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0.25rem">✕</button>
    `;
    container.appendChild(row);
}
</script>
{% endblock %}
