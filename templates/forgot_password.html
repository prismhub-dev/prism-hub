{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Forgot password</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

        {% if sent %}
        <div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:0.5rem;padding:1rem 1.25rem;color:#4ade80;font-size:0.875rem;margin-bottom:1rem">
            If an account exists for that email, a reset link has been sent.
        </div>
        <p class="auth-link"><a href="{{ url_for('login') }}">Back to login</a></p>
        {% else %}
        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary">Send reset link</button>
        </form>
        <p class="auth-link"><a href="{{ url_for('login') }}">Back to login</a></p>
        {% endif %}
    </div>
</div>
{% endblock %}
