{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to your Prism Hub account</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Log in</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>

        <details style="margin-top:1.25rem;font-size:0.8rem;color:var(--text-muted)">
            <summary style="cursor:pointer">Didn't get a verification email?</summary>
            <form method="POST" action="{{ url_for('resend_verification') }}" style="margin-top:0.75rem">
                <div class="form-group" style="margin-bottom:0.75rem">
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn-outline" style="width:100%">Resend verification email</button>
            </form>
        </details>
    </div>
</div>
{% endblock %}
