{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to your Prism Hub account</p>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="identifier">Username or email</label>
                <input type="text" id="identifier" name="identifier" autocomplete="username" placeholder="you@example.com or username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Log in</button>
        </form>
        <p class="auth-link" style="margin-bottom:0.5rem"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
        <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
</div>
{% endblock %}
