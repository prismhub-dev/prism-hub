{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Create an account</h1>
        <p class="auth-subtitle">Start organising your academic life</p>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" placeholder="prismuser" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="btn-primary">Create account</button>
        </form>
        <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
    </div>
</div>
{% endblock %}
