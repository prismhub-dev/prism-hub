{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Reset password</h1>

        {% if success %}
        <div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);border-radius:0.5rem;padding:1rem 1.25rem;color:#4ade80;font-size:0.875rem;margin-bottom:1rem">
            Password updated successfully.
        </div>
        <p class="auth-link"><a href="{{ url_for('login') }}">Log in now</a></p>
        {% else %}
        {% if error %}
        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:0.5rem;padding:1rem 1.25rem;color:#fca5a5;font-size:0.875rem;margin-bottom:1rem">{{ error }}</div>
        {% endif %}
        <p class="auth-subtitle">Enter a new password</p>
        <form method="POST" id="reset-form">
            <input type="hidden" name="access_token" id="access_token">
            <div class="form-group">
                <label for="password">New password</label>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8">
            </div>
            <button type="submit" class="btn-primary">Set new password</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const token = params.get('access_token');
if (token) {
    document.getElementById('access_token').value = token;
} else {
    document.getElementById('reset-form').innerHTML = '<p style="color:#fca5a5;font-size:0.875rem">Invalid or expired reset link.</p>';
}
</script>
{% endblock %}
