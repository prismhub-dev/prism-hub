{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="card">
        <h1 class="auth-title">Reset password</h1>

        {% if success %}
        <div class="alert alert-success">
            Password updated successfully.
        </div>
        <p class="auth-link"><a href="{{ url_for('login') }}">Log in now</a></p>
        {% else %}
        
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <p class="auth-subtitle">Enter a new password</p>

        <div id="error-message" class="alert alert-error" style="display: none;"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="password">New password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Min. 8 characters" 
                    required 
                    minlength="8">
            </div>
            <button type="submit" class="btn-primary" id="submit-btn">Set new password</button>
        </form>

        {% endif %}
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let supabaseClient = null;

    async function initSupabase() {
        if (typeof window.supabase === 'undefined') {
            showError("Supabase client not loaded.");
            return false;
        }

        supabaseClient = window.supabase.createClient(
            "{{ SUPABASE_URL }}",
            "{{ SUPABASE_ANON_KEY }}"
        );
        return true;
    }

    function showError(msg) {
        const errDiv = document.getElementById('error-message');
        errDiv.textContent = msg;
        errDiv.style.display = 'block';
    }

    async function handleReset(e) {
        e.preventDefault();

        const password = document.getElementById('password').value.trim();
        const submitBtn = document.getElementById('submit-btn');

        if (password.length < 8) {
            showError("Password must be at least 8 characters.");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        try {
            const { error } = await supabaseClient.auth.updateUser({ password: password });

            if (error) throw error;

            // Success - redirect with query param
            window.location.href = "{{ url_for('reset_password') }}?success=1";

        } catch (err) {
            showError(err.message || "Failed to reset password. The link may have expired.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Set new password";
        }
    }

    // Initialize on page load
    window.onload = async () => {
        const initialized = await initSupabase();
        if (!initialized) return;

        // Check if we have a valid session (from the magic link)
        const { data, error } = await supabaseClient.auth.getSession();

        if (error || !data.session) {
            showError("Auth session missing! Please use the link from your email again.");
        }

        // Attach form handler
        document.getElementById('reset-form').addEventListener('submit', handleReset);
    };
</script>
{% endblock %}
